<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Travel Router</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent2: #1f6feb;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --orange: #e3b341;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; }

  /* Layout */
  #app { max-width: 1200px; margin: 0 auto; padding: 16px; }
  header { display: flex; align-items: center; gap: 12px; padding: 16px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  header h1 { font-size: 20px; font-weight: 600; color: var(--text); }
  header .subtitle { color: var(--text-dim); font-size: 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .full-width { grid-column: 1 / -1; }
  @media (max-width: 768px) { .grid, .grid-3 { grid-template-columns: 1fr; } }

  /* Cards */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 16px; }
  .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .badge-green { background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.3); }
  .badge-red { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); }
  .badge-yellow { background: rgba(210,153,34,.15); color: var(--yellow); border: 1px solid rgba(210,153,34,.3); }
  .badge-blue { background: rgba(88,166,255,.15); color: var(--accent); border: 1px solid rgba(88,166,255,.3); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Status row */
  .status-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .status-row:last-child { border-bottom: none; }
  .status-label { color: var(--text-dim); font-size: 13px; }
  .status-value { font-weight: 500; font-size: 13px; }

  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 6px 8px; color: var(--text-dim); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
  td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  .empty-row td { text-align: center; color: var(--text-dim); font-family: var(--font); font-style: italic; }

  /* Logs */
  .log-panel { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 10px; height: 280px; overflow-y: auto; font-family: var(--mono); font-size: 11px; line-height: 1.6; }
  .log-line { white-space: pre-wrap; word-break: break-all; color: var(--text-dim); padding: 1px 0; }
  .log-line:hover { background: var(--bg2); }
  .log-filters { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; font-family: var(--font); cursor: pointer; transition: background 0.1s; }
  .btn:hover { background: var(--border); }
  .btn-primary { background: var(--accent2); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent); }
  .btn-danger { background: rgba(248,81,73,.15); border-color: rgba(248,81,73,.3); color: var(--red); }
  .btn-danger:hover { background: rgba(248,81,73,.25); }
  .btn-sm { padding: 3px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Input / select */
  input[type=text], input[type=password], input[type=number], select, textarea {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 13px; font-family: var(--font); padding: 6px 10px;
    outline: none; transition: border-color 0.1s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  input[type=text], input[type=password] { width: 100%; }
  textarea { width: 100%; resize: vertical; }
  label { font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 4px; }
  .field { margin-bottom: 12px; }

  /* Auth banner */
  #auth-banner { background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3); border-radius: 6px; padding: 14px 16px; margin-bottom: 16px; display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  #auth-banner p { color: var(--red); font-size: 13px; flex: 1 1 200px; }
  #auth-banner .field { margin: 0; flex: 2 1 260px; }
  #auth-banner label { color: var(--text-dim); }

  /* Service buttons grid */
  .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
  .service-btn { display: flex; flex-direction: column; gap: 2px; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: background 0.1s; text-align: left; color: var(--text); font-family: var(--font); }
  .service-btn:hover { background: var(--border); border-color: var(--accent); }
  .service-btn .svc-name { font-size: 13px; font-weight: 500; }
  .service-btn .svc-action { font-size: 11px; color: var(--text-dim); }

  /* Config editor */
  .config-table { width: 100%; }
  .config-row { display: grid; grid-template-columns: 220px 1fr; gap: 8px; margin-bottom: 8px; align-items: center; }
  .config-key { font-family: var(--mono); font-size: 12px; color: var(--accent); }
  .config-val input { width: 100%; }
  @media (max-width: 600px) { .config-row { grid-template-columns: 1fr; } }

  /* Bandwidth mini chart */
  .bw-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 11px; }
  .bw-label { width: 30px; color: var(--text-dim); font-family: var(--mono); text-align: right; }
  .bw-bar-wrap { flex: 1; background: var(--bg3); border-radius: 2px; height: 14px; overflow: hidden; }
  .bw-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .bw-bar-rx { background: var(--green); }
  .bw-bar-tx { background: var(--accent); }
  .bw-val { width: 64px; color: var(--text-dim); font-family: var(--mono); font-size: 11px; }
  .bw-legend { display: flex; gap: 12px; margin-top: 8px; }
  .bw-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-dim); }
  .bw-legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* Toast */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 1000; max-width: 300px; }
  #toast.show { opacity: 1; }
  #toast.toast-ok { border-color: var(--green); color: var(--green); }
  #toast.toast-err { border-color: var(--red); color: var(--red); }

  /* Loading spinner */
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Misc */
  .mono { font-family: var(--mono); }
  .dim { color: var(--text-dim); }
  .section-hdr { font-size: 16px; font-weight: 600; margin: 24px 0 12px; color: var(--text); }
  .refresh-ts { font-size: 11px; color: var(--text-dim); }
  hr.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .wg-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 600px) { .wg-form { grid-template-columns: 1fr; } }
  .wg-form .full { grid-column: 1 / -1; }
</style>
</head>
<body>
<div id="app">
  <!-- Auth banner (shown when auth fails) -->
  <div id="auth-banner" style="display:none">
    <p>Authentication required. Enter your access token:</p>
    <div class="field">
      <label>Access Token</label>
      <input type="password" id="token-input" placeholder="Paste token from /var/lib/travel-router/web-token">
    </div>
    <button class="btn btn-primary" onclick="saveToken()">Save &amp; Retry</button>
    <button class="btn" onclick="clearToken()">Clear</button>
  </div>

  <header>
    <div>
      <h1>&#x1F4E1; Pi Travel Router</h1>
      <div class="subtitle" id="header-sub">Loading&hellip;</div>
    </div>
    <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
      <span class="refresh-ts" id="last-refresh"></span>
      <button class="btn btn-sm" onclick="refreshAll()">&#x21BB; Refresh</button>
    </div>
  </header>

  <!-- Status row -->
  <div class="grid-3">
    <div class="card" id="card-uplink">
      <div class="card-title">Uplink</div>
      <div id="uplink-content"><span class="spinner"></span></div>
    </div>
    <div class="card" id="card-vpn">
      <div class="card-title">VPN</div>
      <div id="vpn-content"><span class="spinner"></span></div>
    </div>
    <div class="card" id="card-sys">
      <div class="card-title">System</div>
      <div id="sys-content"><span class="spinner"></span></div>
    </div>
  </div>

  <hr class="divider">

  <!-- AP Clients + Bandwidth -->
  <div class="grid">
    <div class="card">
      <div class="card-title">AP Clients</div>
      <div id="clients-content"><span class="spinner"></span></div>
    </div>
    <div class="card">
      <div class="card-title">Bandwidth (last 24h)</div>
      <div id="bw-content"><span class="spinner"></span></div>
    </div>
  </div>

  <hr class="divider">

  <!-- Logs -->
  <div class="card full-width">
    <div class="card-title">
      Logs
      <span id="log-spinner" style="display:none"><span class="spinner"></span></span>
    </div>
    <div class="log-filters">
      <div style="display:flex;gap:4px;flex:1;max-width:320px;">
        <div style="flex:1">
          <label>Filter by service</label>
          <input type="text" id="log-service" placeholder="e.g. wan-watchdog" oninput="debouncedLogRefresh()">
        </div>
        <div style="width:80px">
          <label>Lines</label>
          <input type="number" id="log-lines" value="50" min="10" max="500" style="width:100%" oninput="debouncedLogRefresh()">
        </div>
      </div>
      <div style="display:flex;gap:4px;margin-top:18px;">
        <button class="btn btn-sm" onclick="fetchLogs()">&#x21BB; Refresh</button>
        <button class="btn btn-sm" onclick="toggleAutoLog()" id="btn-auto-log">Auto OFF</button>
      </div>
    </div>
    <div class="log-panel" id="log-panel">
      <div class="log-line dim">Loading logs&hellip;</div>
    </div>
  </div>

  <hr class="divider">

  <!-- Config editor -->
  <div class="card full-width">
    <div class="card-title">Configuration <span class="dim" style="font-size:11px;text-transform:none;font-weight:400;">/etc/default/travel-router</span></div>
    <div id="config-content"><span class="spinner"></span></div>
    <div style="margin-top:12px;">
      <button class="btn btn-primary" onclick="saveConfig()">Save Config</button>
      <button class="btn" onclick="fetchConfig()" style="margin-left:8px;">&#x21BB; Reload</button>
    </div>
  </div>

  <hr class="divider">

  <!-- Service controls -->
  <div class="card full-width">
    <div class="card-title">Service Controls</div>
    <div class="service-grid" id="service-grid"></div>
    <hr class="divider" style="margin: 16px 0;">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <button class="btn btn-danger" onclick="confirmReboot()">&#x23FB; Reboot Router</button>
    </div>
  </div>

  <hr class="divider">

  <!-- WireGuard peer -->
  <div class="card full-width">
    <div class="card-title">Add WireGuard Peer</div>
    <div class="wg-form">
      <div class="field full">
        <label>Public Key (base64)</label>
        <input type="text" id="wg-pubkey" placeholder="AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=">
      </div>
      <div class="field">
        <label>Allowed IPs (CIDR, comma-separated)</label>
        <input type="text" id="wg-allowedips" placeholder="10.0.0.2/32">
      </div>
      <div class="field">
        <label>Endpoint (optional)</label>
        <input type="text" id="wg-endpoint" placeholder="203.0.113.1:51820">
      </div>
      <div class="field">
        <label>Preshared Key (optional, base64)</label>
        <input type="text" id="wg-psk" placeholder="">
      </div>
    </div>
    <button class="btn btn-primary" onclick="addWgPeer()">Add Peer</button>
  </div>

</div><!-- /#app -->

<div id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let _token = localStorage.getItem('travel-router-token') || '';
let _autoLogInterval = null;
let _statusInterval = null;
let _logDebounce = null;
let _configData = {};

const SERVICES = [
  'hostapd', 'NetworkManager', 'adguardhome',
  'wg-quick@wg0', 'tailscaled', 'wan-watchdog', 'failover-watchdog'
];

// ── Auth ─────────────────────────────────────────────────────────────────────
function saveToken() {
  _token = document.getElementById('token-input').value.trim();
  localStorage.setItem('travel-router-token', _token);
  document.getElementById('auth-banner').style.display = 'none';
  refreshAll();
}
function clearToken() {
  _token = '';
  localStorage.removeItem('travel-router-token');
  document.getElementById('token-input').value = '';
}

// ── Fetch helpers ─────────────────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (_token) headers['Authorization'] = 'Bearer ' + _token;
  const resp = await fetch(path, { ...opts, headers });
  if (resp.status === 401) {
    document.getElementById('auth-banner').style.display = 'flex';
    throw new Error('Unauthorized');
  }
  return resp;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' toast-' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 3000);
}

// ── Formatting helpers ────────────────────────────────────────────────────────
function fmtBytes(b) {
  if (b == null) return '-';
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  if (b < 1024 ** 3) return (b / 1024 / 1024).toFixed(1) + ' MB';
  return (b / 1024 / 1024 / 1024).toFixed(2) + ' GB';
}
function fmtSignal(s) {
  if (s == null) return '-';
  const cls = s >= -60 ? 'green' : s >= -75 ? 'yellow' : 'red';
  return `<span style="color:var(--${cls})">${s} dBm</span>`;
}
function badge(text, type) {
  return `<span class="badge badge-${type}"><span class="dot"></span>${text}</span>`;
}

// ── Status ────────────────────────────────────────────────────────────────────
async function fetchStatus() {
  try {
    const resp = await apiFetch('/api/status');
    if (!resp.ok) return;
    const d = await resp.json();
    renderUplink(d.uplink, d.system, d.battery);
    renderVPN(d.vpn);
    renderSystem(d.system);
    renderClients(d.ap_clients);
    const ts = new Date(d.timestamp * 1000);
    document.getElementById('last-refresh').textContent =
      'Updated ' + ts.toLocaleTimeString();
    const uplinkName = d.uplink ? d.uplink.name : 'unknown';
    document.getElementById('header-sub').textContent =
      `Uplink: ${uplinkName} · ${d.ap_clients ? d.ap_clients.length : 0} AP client(s)`;
  } catch (e) {
    if (e.message !== 'Unauthorized') console.error('Status error', e);
  }
}

function renderUplink(uplink, sys, battery) {
  if (!uplink) { document.getElementById('uplink-content').innerHTML = '<span class="dim">No data</span>'; return; }
  const isUp = uplink.state === 'up';
  let html = `
    <div class="status-row">
      <span class="status-label">Interface</span>
      <span class="status-value mono">${uplink.name || 'none'}</span>
    </div>
    <div class="status-row">
      <span class="status-label">State</span>
      <span>${isUp ? badge('UP', 'green') : badge('DOWN', 'red')}</span>
    </div>`;
  if (battery) {
    const lvl = battery.level;
    const btype = lvl >= 50 ? 'green' : lvl >= 20 ? 'yellow' : 'red';
    html += `<div class="status-row">
      <span class="status-label">Battery</span>
      <span>${badge((lvl != null ? lvl + '%' : battery.raw), btype)}</span>
    </div>`;
  }
  document.getElementById('uplink-content').innerHTML = html;
}

function renderVPN(vpn) {
  if (!vpn) { document.getElementById('vpn-content').innerHTML = '<span class="dim">No data</span>'; return; }
  const ts = vpn.tailscale || {};
  const wg = vpn.wireguard || {};
  const tsOk = ts.state === 'Running';
  const wgOk = wg.state === 'up';
  const html = `
    <div class="status-row">
      <span class="status-label">Tailscale</span>
      <span>${tsOk ? badge(ts.state, 'green') : badge(ts.state || 'unknown', 'yellow')}</span>
    </div>
    ${ts.ip ? `<div class="status-row"><span class="status-label">TS IP</span><span class="status-value mono">${ts.ip}</span></div>` : ''}
    <div class="status-row">
      <span class="status-label">WireGuard</span>
      <span>${wgOk ? badge('UP', 'green') : badge('down', 'red')}</span>
    </div>`;
  document.getElementById('vpn-content').innerHTML = html;
}

function renderSystem(sys) {
  if (!sys) { document.getElementById('sys-content').innerHTML = '<span class="dim">No data</span>'; return; }
  const mem = sys.memory || {};
  const html = `
    <div class="status-row">
      <span class="status-label">Uptime</span>
      <span class="status-value">${sys.uptime || '-'}</span>
    </div>
    <div class="status-row">
      <span class="status-label">Load</span>
      <span class="status-value mono">${(sys.load || []).join(' ')}</span>
    </div>
    <div class="status-row">
      <span class="status-label">Memory</span>
      <span class="status-value">${mem.percent_used || 0}% of ${fmtBytes((mem.total_kb || 0) * 1024)}</span>
    </div>`;
  document.getElementById('sys-content').innerHTML = html;
}

function renderClients(clients) {
  if (!Array.isArray(clients)) { document.getElementById('clients-content').innerHTML = '<span class="dim">No data</span>'; return; }
  if (clients.length === 0) {
    document.getElementById('clients-content').innerHTML =
      '<table><thead><tr><th>MAC</th><th>Signal</th><th>RX</th><th>TX</th></tr></thead>' +
      '<tbody><tr class="empty-row"><td colspan="4">No clients connected</td></tr></tbody></table>';
    return;
  }
  let rows = clients.map(c =>
    `<tr><td>${c.mac}</td><td>${fmtSignal(c.signal)}</td><td>${fmtBytes(c.rx_bytes)}</td><td>${fmtBytes(c.tx_bytes)}</td></tr>`
  ).join('');
  document.getElementById('clients-content').innerHTML =
    `<table><thead><tr><th>MAC</th><th>Signal</th><th>RX</th><th>TX</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ── Bandwidth ─────────────────────────────────────────────────────────────────
async function fetchBandwidth() {
  try {
    const resp = await apiFetch('/api/bandwidth');
    if (!resp.ok) { document.getElementById('bw-content').innerHTML = '<span class="dim">vnstat unavailable</span>'; return; }
    const data = await resp.json();
    renderBandwidth(data);
  } catch (e) {
    document.getElementById('bw-content').innerHTML = '<span class="dim">Error loading bandwidth</span>';
  }
}

function renderBandwidth(data) {
  // vnstat JSON: data.interfaces[0].traffic.day
  const ifaces = (data.interfaces || []);
  if (!ifaces.length) { document.getElementById('bw-content').innerHTML = '<span class="dim">No vnstat data</span>'; return; }
  const iface = ifaces[0];
  const days = ((iface.traffic || {}).day || []).slice(-24);
  if (!days.length) { document.getElementById('bw-content').innerHTML = '<span class="dim">No daily data yet</span>'; return; }

  const maxBytes = Math.max(...days.flatMap(d => [d.rx || 0, d.tx || 0]), 1);
  let html = '';
  const recent = days.slice(-12);
  recent.forEach(d => {
    const label = String(d.date ? (d.date.month || '') + '/' + (d.date.day || '') : d.id || '').slice(-5);
    const rxPct = Math.round(100 * (d.rx || 0) / maxBytes);
    const txPct = Math.round(100 * (d.tx || 0) / maxBytes);
    html += `<div class="bw-bar-row">
      <span class="bw-label">${label}</span>
      <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
        <div class="bw-bar-wrap"><div class="bw-bar bw-bar-rx" style="width:${rxPct}%"></div></div>
        <div class="bw-bar-wrap"><div class="bw-bar bw-bar-tx" style="width:${txPct}%"></div></div>
      </div>
      <div style="text-align:right;min-width:80px;font-size:10px;color:var(--text-dim);">${fmtBytes(d.rx)}<br>${fmtBytes(d.tx)}</div>
    </div>`;
  });
  html += `<div class="bw-legend"><div class="bw-legend-item"><div class="bw-legend-dot" style="background:var(--green)"></div>RX</div><div class="bw-legend-item"><div class="bw-legend-dot" style="background:var(--accent)"></div>TX</div></div>`;
  html += `<div class="dim" style="font-size:11px;margin-top:6px;">Interface: ${iface.name || 'unknown'}</div>`;
  document.getElementById('bw-content').innerHTML = html;
}

// ── Logs ──────────────────────────────────────────────────────────────────────
function debouncedLogRefresh() {
  clearTimeout(_logDebounce);
  _logDebounce = setTimeout(fetchLogs, 400);
}

async function fetchLogs() {
  const service = document.getElementById('log-service').value.trim();
  const lines = parseInt(document.getElementById('log-lines').value) || 50;
  document.getElementById('log-spinner').style.display = '';
  try {
    const params = new URLSearchParams({ lines });
    if (service) params.set('service', service);
    const resp = await apiFetch('/api/logs?' + params);
    if (!resp.ok) { document.getElementById('log-panel').innerHTML = '<div class="log-line dim">Error fetching logs</div>'; return; }
    const d = await resp.json();
    const panel = document.getElementById('log-panel');
    const atBottom = panel.scrollHeight - panel.scrollTop - panel.clientHeight < 40;
    panel.innerHTML = (d.lines || []).map(l => `<div class="log-line">${escHtml(l)}</div>`).join('') ||
      '<div class="log-line dim">No log entries found</div>';
    if (atBottom) panel.scrollTop = panel.scrollHeight;
  } catch (e) {
    if (e.message !== 'Unauthorized') console.error('Log error', e);
  } finally {
    document.getElementById('log-spinner').style.display = 'none';
  }
}

function toggleAutoLog() {
  const btn = document.getElementById('btn-auto-log');
  if (_autoLogInterval) {
    clearInterval(_autoLogInterval);
    _autoLogInterval = null;
    btn.textContent = 'Auto OFF';
  } else {
    _autoLogInterval = setInterval(fetchLogs, 5000);
    btn.textContent = 'Auto ON';
    btn.style.borderColor = 'var(--green)';
    btn.style.color = 'var(--green)';
  }
  if (!_autoLogInterval) {
    btn.style.borderColor = '';
    btn.style.color = '';
  }
}

// ── Config ─────────────────────────────────────────────────────────────────────
async function fetchConfig() {
  document.getElementById('config-content').innerHTML = '<span class="spinner"></span>';
  try {
    const resp = await apiFetch('/api/config');
    if (!resp.ok) { document.getElementById('config-content').innerHTML = '<span class="dim">Unauthorized or unavailable</span>'; return; }
    _configData = await resp.json();
    renderConfig(_configData);
  } catch (e) {
    document.getElementById('config-content').innerHTML = '<span class="dim">Error loading config</span>';
  }
}

function renderConfig(cfg) {
  const keys = Object.keys(cfg).sort();
  if (!keys.length) { document.getElementById('config-content').innerHTML = '<span class="dim">No config data</span>'; return; }
  let html = '<div class="config-table">';
  keys.forEach(k => {
    const v = escAttr(cfg[k]);
    html += `<div class="config-row">
      <div class="config-key">${escHtml(k)}</div>
      <div class="config-val"><input type="text" data-key="${escAttr(k)}" value="${v}"></div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('config-content').innerHTML = html;
}

async function saveConfig() {
  const inputs = document.querySelectorAll('#config-content input[data-key]');
  const payload = {};
  inputs.forEach(inp => { payload[inp.dataset.key] = inp.value; });
  try {
    const resp = await apiFetch('/api/config', {
      method: 'POST',
      body: JSON.stringify(payload),
    });
    const d = await resp.json();
    if (resp.ok) toast('Config saved: ' + (d.updated || []).join(', '), 'ok');
    else toast('Save failed: ' + (d.error || 'Unknown error'), 'err');
  } catch (e) {
    toast('Save failed: ' + e.message, 'err');
  }
}

// ── Services ──────────────────────────────────────────────────────────────────
function renderServices() {
  const grid = document.getElementById('service-grid');
  grid.innerHTML = SERVICES.map(svc =>
    `<button class="service-btn" onclick="restartService('${svc}', this)">
      <span class="svc-name">${svc}</span>
      <span class="svc-action">Click to restart</span>
    </button>`
  ).join('');
}

async function restartService(name, btn) {
  if (!confirm(`Restart ${name}?`)) return;
  btn.disabled = true;
  btn.querySelector('.svc-action').textContent = 'Restarting…';
  try {
    const resp = await apiFetch(`/api/service/${encodeURIComponent(name)}/restart`, { method: 'POST' });
    const d = await resp.json();
    if (resp.ok) { toast(`${name} restarted`, 'ok'); btn.querySelector('.svc-action').textContent = 'Restarted ✓'; }
    else { toast('Failed: ' + (d.error || '?'), 'err'); btn.querySelector('.svc-action').textContent = 'Failed'; }
  } catch (e) {
    toast('Error: ' + e.message, 'err');
    btn.querySelector('.svc-action').textContent = 'Error';
  } finally {
    btn.disabled = false;
    setTimeout(() => { if (btn.querySelector('.svc-action')) btn.querySelector('.svc-action').textContent = 'Click to restart'; }, 4000);
  }
}

function confirmReboot() {
  if (!confirm('Reboot the router? This will disconnect all clients.')) return;
  apiFetch('/api/system/reboot', { method: 'POST' })
    .then(r => r.json())
    .then(() => toast('Rebooting…', 'ok'))
    .catch(e => toast('Error: ' + e.message, 'err'));
}

// ── WireGuard peer ─────────────────────────────────────────────────────────────
async function addWgPeer() {
  const payload = {
    public_key: document.getElementById('wg-pubkey').value.trim(),
    allowed_ips: document.getElementById('wg-allowedips').value.trim(),
    endpoint: document.getElementById('wg-endpoint').value.trim(),
    preshared_key: document.getElementById('wg-psk').value.trim(),
  };
  if (!payload.public_key || !payload.allowed_ips) { toast('Public key and Allowed IPs are required', 'err'); return; }
  try {
    const resp = await apiFetch('/api/vpn/wireguard/peer', {
      method: 'POST',
      body: JSON.stringify(payload),
    });
    const d = await resp.json();
    if (resp.ok) {
      toast('Peer added: ' + d.public_key, 'ok');
      document.getElementById('wg-pubkey').value = '';
      document.getElementById('wg-allowedips').value = '';
      document.getElementById('wg-endpoint').value = '';
      document.getElementById('wg-psk').value = '';
    } else {
      toast('Error: ' + (d.error || '?'), 'err');
    }
  } catch (e) {
    toast('Error: ' + e.message, 'err');
  }
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function refreshAll() {
  await fetchStatus();
  fetchBandwidth();
  fetchLogs();
  fetchConfig();
}

async function init() {
  renderServices();
  await refreshAll();
  // Auto-refresh status every 10s
  _statusInterval = setInterval(fetchStatus, 10000);
}

init();
</script>
