name: Shellcheck

on:
  push:
    paths:
      - 'scripts/**'
      - 'install.sh'
  pull_request:
    paths:
      - 'scripts/**'
      - 'install.sh'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning

      - name: Shellcheck install.sh
        uses: ludeeus/action-shellcheck@master
        with:
          additional_files: 'install.sh'
          severity: warning
