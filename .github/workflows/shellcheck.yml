name: Shellcheck

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'scripts/**'
      - 'install.sh'
      - 'build/**'
      - 'firstboot/**'
      - 'config/**'
      - '.github/workflows/shellcheck.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Shellcheck scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          scandir: './scripts'
          severity: warning

      - name: Shellcheck install.sh
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          additional_files: 'install.sh'
          severity: warning

      - name: Shellcheck build stage scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          scandir: './build/stage-travel-router'
          severity: warning

      - name: Shellcheck config shell scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          additional_files: 'config/rc.local config/nm-wan-metrics'
          severity: warning
