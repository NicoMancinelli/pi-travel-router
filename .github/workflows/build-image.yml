name: Build Pi Image

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref to embed in the image (SHA, branch, or tag). Leave empty to use the triggering commit SHA.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'
    paths:
      - 'build/**'
      - 'install.sh'
      - 'scripts/**'
      - 'firstboot/**'
      - 'systemd/**'
      - 'config/**'
  pull_request:
    paths:
      - 'build/**'
      - 'install.sh'
      - 'scripts/**'
      - 'firstboot/**'
      - 'systemd/**'
      - 'config/**'

jobs:
  build:
    name: Build travelrouter image with pi-gen
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout pi-travel-router
        uses: actions/checkout@v6
        with:
          path: pi-travel-router
          fetch-depth: 0

      - name: Checkout pi-gen
        uses: actions/checkout@v6
        with:
          repository: RPi-Distro/pi-gen
          ref: bookworm-arm64
          path: pi-gen

      - name: Install pi-gen build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coreutils quilt parted qemu-user-static debootstrap zerofree zip \
            dosfstools libarchive-tools libcap2-bin grep rsync xz-utils file \
            git curl bc qemu-utils kpartx gpg pigz arch-test
          sudo ln -sf /usr/bin/qemu-arm-static /usr/local/bin/qemu-arm
          sudo ln -sf /usr/bin/qemu-aarch64-static /usr/local/bin/qemu-aarch64
          sudo modprobe binfmt_misc || true

      - name: Cache pi-gen apt downloads
        uses: actions/cache@v5
        with:
          path: |
            pi-gen/work/*/aptcache
          key: pi-gen-aptcache-${{ runner.os }}-bookworm-${{ hashFiles('pi-travel-router/build/stage-travel-router/00-setup/00-packages', 'pi-travel-router/install.sh') }}
          restore-keys: |
            pi-gen-aptcache-${{ runner.os }}-bookworm-

      - name: Stage custom config and stage into pi-gen
        run: |
          set -euxo pipefail
          cp pi-travel-router/build/config pi-gen/config
          ln -snf "$GITHUB_WORKSPACE/pi-travel-router/build/stage-travel-router" pi-gen/stage-travel-router
          # Skip stages we don't need to export (we only export our custom stage).
          touch pi-gen/stage2/SKIP_IMAGES pi-gen/stage2/SKIP_NOOBS || true

      - name: Validate build/config
        run: |
          set -euo pipefail
          # WPA_COUNTRY must be unset or a valid 2-letter ISO code.
          # An empty string causes raspi-config nonint do_wifi_country "" to fail
          # silently with bash -e inside the stage2/02-net-tweaks chroot.
          if grep -qE "^WPA_COUNTRY=''" pi-travel-router/build/config; then
            echo "ERROR: build/config sets WPA_COUNTRY='' (empty string)."
            echo "       Remove the line entirely — pi-gen's [ -v WPA_COUNTRY ] guard"
            echo "       fires on empty strings, then raspi-config fails non-interactively."
            exit 1
          fi
          echo "build/config validation passed"

      - name: Smoke-test key scripts (syntax check)
        run: |
          set -euo pipefail
          bash -n pi-travel-router/install.sh
          bash -n pi-travel-router/build/stage-travel-router/00-setup/01-run.sh
          bash -n pi-travel-router/build/stage-travel-router/files/imager-compat.sh
          bash -n pi-travel-router/scripts/wan-watchdog.sh
          bash -n pi-travel-router/scripts/captive-check.sh
          bash -n pi-travel-router/scripts/travel-tui-legacy.sh
          echo "All syntax checks passed"

      - name: Build image
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
          GIT_REF: ${{ inputs.git_ref != '' && inputs.git_ref || github.sha }}
        run: |
          set -euxo pipefail
          cd pi-gen
          sudo -E ./build.sh

      - name: Locate built image
        id: locate
        run: |
          set -euxo pipefail
          IMG_PATH="$(find pi-gen/deploy -maxdepth 2 -name '*.img.xz' | head -n1)"
          if [ -z "${IMG_PATH}" ]; then
            echo "No .img.xz found under pi-gen/deploy" >&2
            ls -laR pi-gen/deploy || true
            exit 1
          fi
          echo "img_path=${IMG_PATH}" >> "$GITHUB_OUTPUT"
          echo "img_name=$(basename "${IMG_PATH}")" >> "$GITHUB_OUTPUT"

      - name: Smoke-test built image
        run: |
          set -euo pipefail
          IMG_PATH="${{ steps.locate.outputs.img_path }}"
          # Decompress to a temp file for kpartx
          TMPIMG="$(mktemp --suffix=.img)"
          MOUNTPOINT="$(mktemp -d)"
          trap 'sudo umount "${MOUNTPOINT}" 2>/dev/null || true; sudo kpartx -dv "${TMPIMG}" 2>/dev/null || true; rm -f "${TMPIMG}"' EXIT
          xz -dk "${IMG_PATH}" --stdout > "${TMPIMG}"
          # Map partitions
          sudo kpartx -av "${TMPIMG}"
          LOOPDEV="$(sudo kpartx -l "${TMPIMG}" | awk 'NR==2{print $1}')"
          sudo mount "/dev/mapper/${LOOPDEV}" "${MOUNTPOINT}"
          echo "--- Smoke test: checking image contents ---"
          test -f "${MOUNTPOINT}/etc/systemd/system/firstboot.service"   || { echo "FAIL: firstboot.service missing"; exit 1; }
          test -f "${MOUNTPOINT}/usr/local/sbin/imager-compat.sh"        || { echo "FAIL: imager-compat.sh missing"; exit 1; }
          HOSTNAME="$(tr -d '[:space:]' < "${MOUNTPOINT}/etc/hostname")"
          [ "${HOSTNAME}" = "travelrouter" ]                             || { echo "FAIL: hostname is '${HOSTNAME}', expected 'travelrouter'"; exit 1; }
          test -f "${MOUNTPOINT}/etc/travel-router-image-version"        || { echo "FAIL: travel-router-image-version missing"; exit 1; }
          # IPv6 firewall persistence (soft warn — rules.v6 is generated at first-boot runtime)
          test -f "${MOUNTPOINT}/etc/iptables/rules.v6" || \
            echo "WARN: rules.v6 not found (expected — first-boot generated by travel-router-firewall.sh --save)"
          echo "--- All smoke tests passed ---"
          sudo umount "${MOUNTPOINT}"
          sudo kpartx -dv "${TMPIMG}"
          rm -f "${TMPIMG}"

      - name: Generate SBOM
        run: |
          set -euo pipefail
          IMG_PATH="${{ steps.locate.outputs.img_path }}"
          TMPIMG="$(mktemp --suffix=.img)"
          MOUNTPOINT="$(mktemp -d)"
          trap 'sudo umount "${MOUNTPOINT}" 2>/dev/null || true; sudo kpartx -dv "${TMPIMG}" 2>/dev/null || true; rm -f "${TMPIMG}"' EXIT
          xz -dk "${IMG_PATH}" --stdout > "${TMPIMG}"
          sudo kpartx -av "${TMPIMG}"
          LOOPDEV="$(sudo kpartx -l "${TMPIMG}" | awk 'NR==2{print $1}')"
          sudo mount "/dev/mapper/${LOOPDEV}" "${MOUNTPOINT}"
          # Generate SBOM using dpkg-query via chroot
          sudo chroot "${MOUNTPOINT}" dpkg-query -W --showformat='${Package}\t${Version}\n' > sbom.txt
          echo "SBOM generated: $(wc -l < sbom.txt) packages"
          sudo umount "${MOUNTPOINT}"
          sudo kpartx -dv "${TMPIMG}"
          rm -f "${TMPIMG}"

      - name: Cleanup mount
        if: always()
        run: |
          sudo umount /tmp/travelrouter-mount 2>/dev/null || true
          sudo rmdir /tmp/travelrouter-mount 2>/dev/null || true
          # Also sweep any leftover mktemp -d mounts from smoke-test / SBOM steps
          for mp in /tmp/tmp.*; do
            sudo umount "$mp" 2>/dev/null || true
            sudo rmdir "$mp" 2>/dev/null || true
          done

      - name: Upload image as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: travelrouter-image
          path: ${{ steps.locate.outputs.img_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload SBOM as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: travelrouter-sbom
          path: sbom.txt
          if-no-files-found: error
          retention-days: 14

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.locate.outputs.img_path }}
            sbom.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
