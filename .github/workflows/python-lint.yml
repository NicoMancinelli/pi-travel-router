name: Python Lint

on:
  push:
    paths:
      - 'firstboot/**'
  pull_request:
    paths:
      - 'firstboot/**'

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: pip install flake8 pylint

      - name: Compile check
        run: find firstboot -name "*.py" -exec python -m py_compile {} +

      - name: flake8
        run: find firstboot -name "*.py" | xargs flake8 --max-line-length=120

      - name: pylint
        run: pylint --disable=C0114,C0115,C0116 firstboot/server.py
