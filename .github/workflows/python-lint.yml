name: Python Lint

on:
  push:
    paths:
      - 'firstboot/**'
  pull_request:
    paths:
      - 'firstboot/**'

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install linters
        run: pip install flake8 pylint

      - name: Compile check
        run: find firstboot -name "*.py" -exec python -m py_compile {} +

      - name: flake8
        run: find firstboot -name "*.py" | xargs flake8 --max-line-length=120

      - name: pylint
        run: >
          pylint firstboot/server.py
          --max-line-length=120
          --disable=C0114,C0115,C0116
          --disable=C0103
          --disable=C0415
          --disable=R0911,R0912,R0914,R0915
          --disable=R1732
          --disable=W0603
