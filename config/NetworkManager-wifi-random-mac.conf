# MAC address randomization for WiFi uplink (wlan0)
# Prevents cross-property tracking when connecting to hotel/airport WiFi
# Install to: /etc/NetworkManager/conf.d/wifi-random-mac.conf

[device-mac-randomization]
wifi.scan-rand-mac-address=yes

[connection-mac-randomization]
ethernet.cloned-mac-address=stable
wifi.cloned-mac-address=random
