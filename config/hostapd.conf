# RaspAP hostapd configuration — reference copy
# Actual file: /etc/hostapd/hostapd.conf (managed by RaspAP web UI)
# IMPORTANT: Change ssid and wpa_passphrase before use

driver=nl80211
ctrl_interface=/var/run/hostapd
ctrl_interface_group=0
beacon_int=100
auth_algs=1
wpa_key_mgmt=WPA-PSK
ssid=YourSSIDHere
channel=6
hw_mode=g
wpa_passphrase=YourPassphraseHere
interface=uap0
wpa=2
wpa_pairwise=CCMP
country_code=US

# 802.11n — enabled (Pi Zero 2 W brcmfmac driver supports these)
# Note: [SHORT-GI-40] removed — not supported by brcmfmac on Zero 2 W
ieee80211n=1
wmm_enabled=1
ht_capab=[HT40][SHORT-GI-20][DSSS_CCK-40]

# DTIM=1: iOS devices wake every beacon instead of every 2nd
# Reduces client latency by ~100ms on interactive traffic
dtim_period=1
