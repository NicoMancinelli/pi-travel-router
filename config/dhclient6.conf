# dhclient6.conf — DHCPv6 client configuration for uplink (WAN) interfaces
# Used by the 70-dhcpv6-uplink NetworkManager dispatcher script.
# Does NOT apply to uap0 (the AP interface) — only uplink/WAN interfaces.

timeout 30;
retry 60;
select-timeout 5;

# Request standard options; omit dhcp6.name-servers if using stubby/dnsmasq
request dhcp6.name-servers, dhcp6.domain-search;
