# radvd.conf — Router Advertisement for AP clients on uap0
# Advertises an IPv6 prefix so AP clients can use SLAAC autoconfiguration.
# The prefix is derived from the delegated prefix received by the uplink.
# DHCPv6-PD (prefix delegation) is handled by the 70-dhcpv6-uplink dispatcher.

interface uap0 {
    AdvSendAdvert on;
    MinRtrAdvInterval 30;
    MaxRtrAdvInterval 100;
    # AdvDefaultLifetime 0 would make this a non-default-router;
    # leave at default (3*MaxRtrAdvInterval) so clients use this router.
    prefix ::/64 {
        AdvOnLink on;
        AdvAutonomous on;
        AdvRouterAddr on;
    };
};
