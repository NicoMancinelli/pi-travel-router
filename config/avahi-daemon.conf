# Avahi mDNS reflector — install to /etc/avahi/avahi-daemon.conf
# Bridges mDNS/Bonjour between uap0 (AP clients) and tailscale0 (homelab)

[server]
use-ipv6=no
allow-interfaces=uap0,tailscale0
enable-dbus=yes

[wide-area]
enable-wide-area=yes

[publish]
disable-publishing=no

[reflector]
enable-reflector=yes
reflect-ipv=no

[rlimits]
rlimit-core=0
rlimit-data=4194304
rlimit-fsize=0
rlimit-nofile=768
rlimit-stack=4194304
nprocess-time-max=300
