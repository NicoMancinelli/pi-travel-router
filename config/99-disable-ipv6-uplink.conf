# Disable IPv6 on uplink interfaces to prevent carrier DPI detection
# IPv6 traffic bypasses TTL mangling rules, allowing carriers to fingerprint hotspot use
# Install to: /etc/sysctl.d/99-disable-ipv6-uplink.conf
# Apply: sysctl -p /etc/sysctl.d/99-disable-ipv6-uplink.conf

net.ipv6.conf.wlan0.disable_ipv6 = 1
net.ipv6.conf.eth0.disable_ipv6 = 1
