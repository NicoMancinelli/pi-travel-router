# Static DHCP leases for known devices
# Install to: /etc/dnsmasq.d/static-leases.conf
# Format: dhcp-host=MAC,IP,HOSTNAME
# Find MAC: arp -a (on device) or check RaspAP DHCP leases page

# AP clients (10.3.141.x)
# dhcp-host=aa:bb:cc:dd:ee:ff,10.3.141.10,macbook
# dhcp-host=11:22:33:44:55:66,10.3.141.11,ipad
# dhcp-host=aa:11:bb:22:cc:33,10.3.141.12,phone

# USB gadget direct laptop connection (192.168.7.x)
# dhcp-host=<laptop-usb-mac>,192.168.7.10,laptop-usb
