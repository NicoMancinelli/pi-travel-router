# USB Ethernet Gadget DHCP — serves IP to laptop connected via USB-C → micro-USB
# Install to: /etc/dnsmasq.d/usb-gadget.conf
# Pi's usb0 IP: 192.168.7.1 (set in dhcpcd.conf)
# Laptop gets: 192.168.7.2–100, gateway 192.168.7.1

interface=usb0
dhcp-range=192.168.7.2,192.168.7.100,255.255.255.0,12h
dhcp-option=interface:usb0,3,192.168.7.1
