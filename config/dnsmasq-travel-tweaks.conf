# Travel router dnsmasq optimizations
# Install to: /etc/dnsmasq.d/travel-tweaks.conf

# Larger DNS cache (RaspAP default is 150 — far too small for travel)
cache-size=2048

# Override low TTLs from hotel/captive portal DNS (prevents constant upstream queries)
min-cache-ttl=300

# Negative cache TTL (cache NXDOMAIN for 60s)
neg-ttl=60

# Increase concurrent DNS query slots
dns-forward-max=300

# Uncomment to use fastest responding upstream:
# all-servers

# Uncomment to log all DNS queries for debugging:
# log-queries
