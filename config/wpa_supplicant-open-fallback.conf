# wpa_supplicant open WiFi fallback
# Install to: /etc/wpa_supplicant/wpa_supplicant.conf
# RaspAP writes higher-priority networks here via its UI
# This entry (priority=1) acts as catch-all when no saved network is found

ctrl_interface=DIR=/var/run/wpa_supplicant GROUP=netdev
update_config=1
country=US

# Open network fallback — connects to any open WiFi when no saved network available
# priority=1 is lowest; RaspAP-managed networks get priority 10+
network={
    key_mgmt=NONE
    priority=1
    scan_ssid=0
    id_str="open-fallback"
}
