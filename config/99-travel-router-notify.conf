// Send ntfy.sh notification after unattended-upgrades installs packages.
// Install to: /etc/apt/apt.conf.d/99-travel-router-notify

DPkg::Post-Invoke {
    "sh -c 'notify=/usr/local/bin/notify-router.sh; [ -x \"$notify\" ] || exit 0; if [ -f /var/run/reboot-required ]; then $notify \"Security updates installed — reboot at 03:30\" 2>/dev/null; else $notify \"Security updates installed\" 2>/dev/null; fi' || true";
};
